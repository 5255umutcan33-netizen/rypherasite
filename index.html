<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryphera OS | Management Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap');
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; } 
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #ffffff, #555555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .discord-btn { background: #5865F2; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .discord-btn:hover { background: #4752C4; transform: translateY(-2px); shadow: 0 10px 20px rgba(88, 101, 242, 0.4); }
        
        /* Intro & Page Transitions */
        #pre-intro { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; animation: fadeOut 1s ease 3s forwards; }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        #main-content { opacity: 0; transition: opacity 1s ease; }
        .page-view { display: none; opacity: 0; transform: scale(0.98); transition: all 0.4s ease; }
        .page-view.active { display: block; opacity: 1; transform: scale(1); }

        /* Modern Input */
        input, textarea, select { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 12px; padding: 12px 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #5865F2; background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased">

    <div id="pre-intro"><h1 class="text-6xl font-black tracking-tighter animate-pulse">RYPHERA</h1></div>

    <div id="main-content">
        <nav class="p-6 flex items-center justify-between max-w-7xl mx-auto w-full">
            <div class="flex items-center gap-3 cursor-pointer" onclick="changePage('home')">
                <img src="logo.png" id="nav-logo" class="h-10 w-10 rounded-full border border-white/10" onerror="this.src='https://via.placeholder.com/40'">
                <span class="text-xl font-black tracking-tighter">RYPHERA<span class="text-gray-600">OS</span></span>
            </div>
            
            <div class="hidden md:flex gap-8 text-xs uppercase tracking-[0.2em] font-bold text-gray-500">
                <a href="#" onclick="changePage('home')" class="hover:text-white transition">Home</a>
                <a href="#" onclick="changePage('scripts')" class="hover:text-white transition">Scripts</a>
                <a href="#" onclick="changePage('apply')" class="hover:text-white transition">Apply</a>
                <a href="#" onclick="changePage('admin')" id="admin-nav" class="hidden text-red-500 hover:text-red-400 transition">Admin</a>
            </div>

            <div id="user-section">
                <button onclick="loginWithDiscord()" class="discord-btn px-6 py-2.5 rounded-full text-sm font-bold flex items-center gap-2">
                    <i class="fa-brands fa-discord"></i> Login
                </button>
            </div>
        </nav>

        <div id="home-view" class="page-view active">
            <div class="text-center py-32">
                <h1 class="text-7xl md:text-9xl font-black gradient-text tracking-tighter mb-8">RYPHERA OS.</h1>
                <p class="text-gray-500 text-xl max-w-xl mx-auto font-light">The next generation of scripting solutions. Secure, fast, and persistent.</p>
            </div>
        </div>

        <div id="apply-view" class="page-view">
            <div class="max-w-2xl mx-auto px-6 py-12">
                <div class="glass p-10 rounded-[2rem]">
                    <div id="apply-locked" class="text-center py-10">
                        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-lock text-3xl text-gray-600"></i></div>
                        <h2 class="text-2xl font-bold mb-2">Login Required</h2>
                        <p class="text-gray-500 mb-8">Please login with Discord to submit an application.</p>
                        <button onclick="loginWithDiscord()" class="discord-btn px-10 py-4 rounded-2xl font-bold">Connect Discord</button>
                    </div>

                    <form id="apply-form" class="hidden space-y-6" onsubmit="handleApply(event)">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-3xl font-black tracking-tight" id="form-title">Staff Application</h2>
                            <select id="lang-toggle" onchange="updateLang()" class="text-xs bg-white/5 border-none p-2">
                                <option value="TR">🇹🇷 Türkçe</option>
                                <option value="EN" selected>🇺🇸 English</option>
                            </select>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="flex flex-col gap-2">
                                <label class="text-xs font-bold text-gray-500 uppercase" id="label-name">Full Name</label>
                                <input type="text" id="form-name" required placeholder="...">
                            </div>
                            <div class="flex flex-col gap-2">
                                <label class="text-xs font-bold text-gray-500 uppercase" id="label-age">Age</label>
                                <input type="number" id="form-age" required>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-gray-500 uppercase" id="label-active">Daily Activity (Hours)</label>
                            <input type="text" id="form-active" required placeholder="e.g. 5-6 hours">
                        </div>

                        <div class="flex flex-col gap-2">
                            <label class="text-xs font-bold text-gray-500 uppercase" id="label-why">Why should we choose you?</label>
                            <textarea id="form-why" rows="4" required></textarea>
                        </div>

                        <button type="submit" id="submit-btn" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-gray-200 transition">Submit Application</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1491071700715048970";
        const REDIRECT_URI = "https://rypherasite-ludd.vercel.app/"; 
        const SAHIP_ID = "345821033414262794";
        const WEBHOOKS = {
            TR: "https://discord.com/api/webhooks/1491124164042424332/vRWiYUmtb3pF34escp5ygnMnyfrH3bgyCZaKHfmgTDXQE2dxUi7cL-3t0tLN3c_9wDaT",
            EN: "https://discord.com/api/webhooks/1491124036359557362/2v_uo05PuQS1dPSIvdKCRCHcRAaZPS8s8d6G0koGce9fDG4J6BDWAn20cXNnfQoWQgaA"
        };

        let user = null;

        const langData = {
            TR: { title: "Yetkili Başvurusu", name: "İsim Soyisim", age: "Yaş", active: "Günlük Aktiflik", why: "Neden Biz?", btn: "BAŞVURUYU GÖNDER" },
            EN: { title: "Staff Application", name: "Full Name", age: "Age", active: "Daily Activity", why: "Why should we choose you?", btn: "SUBMIT APPLICATION" }
        };

        // 1. GİRİŞ KONTROLÜ (Persistent Login)
        window.onload = () => {
            const savedToken = localStorage.getItem('ryphera_token');
            const hash = new URLSearchParams(window.location.hash.slice(1));
            const token = hash.get('access_token') || savedToken;

            if (token) {
                fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } })
                .then(res => res.json())
                .then(data => {
                    if(data.id) {
                        user = data;
                        localStorage.setItem('ryphera_token', token);
                        updateUI();
                    } else {
                        localStorage.removeItem('ryphera_token');
                    }
                });
            }
            document.getElementById('main-content').style.opacity = '1';
        };

        function loginWithDiscord() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
        }

        function updateUI() {
            const userSection = document.getElementById('user-section');
            userSection.innerHTML = `
                <div class="flex items-center gap-3 bg-white/5 p-1 pr-4 rounded-full border border-white/10">
                    <img src="https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png" class="w-8 h-8 rounded-full">
                    <span class="text-sm font-bold">${user.username}</span>
                </div>
            `;
            document.getElementById('apply-locked').classList.add('hidden');
            document.getElementById('apply-form').classList.remove('hidden');
            if(user.id === SAHIP_ID) document.getElementById('admin-nav').classList.remove('hidden');
        }

        function updateLang() {
            const l = document.getElementById('lang-toggle').value;
            document.getElementById('form-title').innerText = langData[l].title;
            document.getElementById('label-name').innerText = langData[l].name;
            document.getElementById('label-age').innerText = langData[l].age;
            document.getElementById('label-active').innerText = langData[l].active;
            document.getElementById('label-why').innerText = langData[l].why;
            document.getElementById('submit-btn').innerText = langData[l].btn;
        }

        function handleApply(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "...";

            const lang = document.getElementById('lang-toggle').value;
            const payload = {
                embeds: [{
                    title: `New Application - ${lang}`,
                    color: 0xffffff,
                    fields: [
                        { name: "User", value: `<@${user.id}> (${user.username})`, inline: true },
                        { name: "Name", value: document.getElementById('form-name').value, inline: true },
                        { name: "Age", value: document.getElementById('form-age').value, inline: true },
                        { name: "Activity", value: document.getElementById('form-active').value },
                        { name: "Reason", value: document.getElementById('form-why').value }
                    ],
                    footer: { text: `User ID: ${user.id}` }
                }],
                // BUTONLAR (Botun dinlemesi için)
                components: [{
                    type: 1,
                    components: [
                        { type: 2, style: 3, label: "Approve / Onayla", custom_id: `approve_${user.id}` },
                        { type: 2, style: 4, label: "Reject / Reddet", custom_id: `reject_${user.id}` }
                    ]
                }]
            };

            fetch(WEBHOOKS[lang], {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                btn.innerText = "SUCCESS / BAŞARILI";
                btn.classList.add('bg-green-500');
            });
        }

        function changePage(id) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById(id + '-view').classList.add('active');
        }
    </script>
</body>
</html>
